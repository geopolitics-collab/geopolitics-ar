<style>
:root{--bg:#f8f7f4;--ink:#1a1a2a;--or:#d4a843;--red:#c8281e;--mid:#5a5870;--rule:#e2ddd8}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Naskh Arabic',sans-serif;background:var(--bg);color:var(--ink);direction:rtl;min-height:100vh;display:flex;flex-direction:column}

.top a{color:rgba(255,255,255,.5)}.top a:hover{color:var(--or)}
.logo-link{font-family:'Noto Serif Arabic',serif;font-size:1.4rem;font-weight:900;color:var(--ink);letter-spacing:-.02em}

.msg{font-family:'Noto Serif Arabic',serif;font-size:clamp(1.3rem,4vw,2rem);font-weight:700;color:var(--ink)}
.sub{font-size:.95rem;color:var(--mid);max-width:400px;line-height:1.8}
.actions{display:flex;gap:.8rem;flex-wrap:wrap;justify-content:center;margin-top:.5rem}
.btn{display:inline-flex;align-items:center;gap:.4rem;padding:.65rem 1.4rem;border-radius:5px;font-family:'Noto Naskh Arabic',sans-serif;font-size:.82rem;font-weight:700;transition:all .2s}
.btn-primary{background:var(--ink);color:#fff}.btn-primary:hover{background:var(--red)}
.btn-ghost{border:1.5px solid var(--rule);color:var(--ink)}.btn-ghost:hover{border-color:var(--ink)}
footer{text-align:center;padding:1.2rem;font-size:.65rem;color:var(--mid);border-top:1px solid var(--rule)}
</style>
</head>
<body>
